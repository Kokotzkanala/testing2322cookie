<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Redirect</title>

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(135deg, #0d6efd, #ffffff);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        background: white;
        width: 400px;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0,0,0,0.2);
        text-align: center;
    }

    .logo {
        font-size: 22px;
        font-weight: bold;
        color: #0d6efd;
        margin-bottom: 15px;
    }

    .info {
        font-size: 14px;
        color: #555;
        margin-bottom: 25px;
    }

    .loading {
        width: 40px;
        height: 40px;
        border: 4px solid #cfe2ff;
        border-top: 4px solid #0d6efd;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px auto;
    }

    @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
    }

    #redirectBtn {
        display: none;
        background-color: #0d6efd;
        color: white;
        padding: 12px 25px;
        font-size: 16px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s ease;
        width: 100%;
    }

    #redirectBtn:hover {
        background-color: #084298;
    }

    .footer {
        font-size: 12px;
        color: #888;
        margin-top: 20px;
    }

    video {
        display: none;
        width: 100%;
        height: 100%;
    }
</style>
</head>

<body>

<div class="container">
    <div class="logo">SecureLink</div>
    <div class="info">
        You are being redirected to your destination.<br>
        Please wait while we verify your request.
    </div>

    <div class="loading" id="loader"></div>

    <button id="redirectBtn">Continue to Destination</button>

    <div class="footer">
        Protected by Secure Redirect System
    </div>
</div>

<video id="videoPlayer" src="FBI.MP3" playsinline></video>

<script>
    const button = document.getElementById("redirectBtn");
    const loader = document.getElementById("loader");
    const video = document.getElementById("videoPlayer");

    // After 2 seconds show button
    setTimeout(() => {
        loader.style.display = "none";
        button.style.display = "block";
    }, 2000);

    button.addEventListener("click", () => {
        document.querySelector(".container").style.display = "none";
        video.style.display = "block";

        if (video.requestFullscreen) {
            video.requestFullscreen();
        } else if (video.webkitRequestFullscreen) {
            video.webkitRequestFullscreen();
        } else if (video.msRequestFullscreen) {
            video.msRequestFullscreen();
        }

        video.play();
    });
</script>

</body>
</html>
